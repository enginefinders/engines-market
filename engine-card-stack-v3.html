<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Engine Type Card Stack</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Urbanist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  font-family:'Urbanist',sans-serif;
  background:#f0f2f7;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
body{
  display:flex;justify-content:center;
  min-height:100vh;padding:0 0 60px;
}
.root{
  width:100%;max-width:390px;
  padding:32px 0 48px;
  background:#f0f2f7;
}

/* ── SECTION HEAD ─────────────────── */
.section-head{padding:0 20px 26px}
.s-eyebrow{
  font-size:10px;font-weight:700;letter-spacing:0.14em;
  text-transform:uppercase;color:#15803d;
  display:flex;align-items:center;gap:7px;margin-bottom:10px;
}
.s-eyebrow::before{content:'';width:14px;height:2px;background:#15803d;border-radius:2px}
.s-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:36px;color:#000032;line-height:1.05;margin-bottom:8px;letter-spacing:0.01em;
}
.s-title em{color:#15803d;font-style:normal}
.s-sub{font-size:12.5px;color:#6b7280;line-height:1.6}

/* ── STACK WRAPPER ─────────────────── */
.stack-outer{
  position:relative;
  padding:0 14px;
}

/* ── CARD BASE ─────────────────────── */
.c-card{
  position:relative;
  border-radius:22px;
  cursor:pointer;
  transition:
    transform 0.42s cubic-bezier(0.34,1.22,0.64,1),
    margin-top 0.38s cubic-bezier(0.4,0,0.2,1),
    box-shadow 0.3s ease;
  will-change:transform;
  perspective:1000px;
}

/* spacing between stacked cards */
.c-card+.c-card{ margin-top:-54px }
/* when a card is active, give breathing room below it */
.c-card.active+.c-card{ margin-top:14px }
.c-card.active~.c-card+.c-card{ margin-top:-54px }

/* ── FLIP CONTAINER ────────────────── */
.flip-inner{
  width:100%;
  transform-style:preserve-3d;
  transition:transform 0.55s cubic-bezier(0.16,1,0.3,1);
  border-radius:22px;
}
.c-card.flipped .flip-inner{ transform:rotateY(180deg) }

/* ── FRONT FACE ────────────────────── */
.face{
  border-radius:22px;
  overflow:hidden;
  -webkit-backface-visibility:hidden;
  backface-visibility:hidden;
}
.face-front{
  background:#ffffff;
  box-shadow:0 8px 30px rgba(0,0,50,0.1);
}
.face-back{
  position:absolute;
  top:0;left:0;right:0;
  transform:rotateY(180deg);
  background:linear-gradient(155deg,#0d1b2e 0%,#0f2642 40%,#0d1b2e 100%);
  box-shadow:0 12px 40px rgba(0,0,50,0.3);
  min-height:100%;
}

/* collapsed peek bar (stacked state) */
.peek-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;
  min-height:62px;
}
.peek-left{display:flex;flex-direction:column;gap:2px}
.peek-num{
  font-size:9.5px;font-weight:700;letter-spacing:0.12em;
  text-transform:uppercase;color:#9ca3af;
}
.peek-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:0.02em;color:#000032;line-height:1;
}
.peek-price{
  font-family:'Urbanist',sans-serif;
  font-size:13px;font-weight:700;color:#15803d;white-space:nowrap;
}
.peek-icon{
  width:30px;height:30px;border-radius:50%;
  background:#f0fdf4;border:1.5px solid #bbf7d0;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:transform 0.3s;
  font-size:14px;color:#15803d;
}
.c-card.active .peek-icon{ transform:rotate(45deg) }

/* ── EXPANDED FRONT BODY ───────────── */
.card-expand{
  height:0;overflow:hidden;
  transition:height 0.45s cubic-bezier(0.4,0,0.2,1);
}
.c-card.active .card-expand{ height:var(--expand-h,auto) }

.expand-inner{
  padding:0 20px 22px;
  border-top:1px solid #f3f4f6;
}

.exp-price-row{
  display:flex;align-items:center;gap:8px;
  padding:14px 0 12px;
}
.exp-price-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:#f0fdf4;border:1px solid #bbf7d0;
  color:#15803d;font-weight:700;font-size:13px;
  padding:6px 14px;border-radius:100px;
}
.exp-type{font-size:11px;color:#9ca3af;font-weight:500}
.exp-divider{height:1px;background:#f3f4f6;margin-bottom:14px}
.exp-desc{font-size:13px;color:#374151;line-height:1.65;margin-bottom:16px}

.exp-items{display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.exp-item{display:flex;align-items:flex-start;gap:9px}
.exp-check{
  width:18px;height:18px;border-radius:50%;
  background:#f0fdf4;border:1.5px solid #bbf7d0;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;font-size:9px;color:#15803d;
}
.exp-item-text{font-size:12.5px;color:#374151;line-height:1.5}
.exp-item-text strong{color:#111827;font-weight:700}
.exp-saving{
  display:inline-flex;align-items:center;gap:6px;
  background:#f0fdf4;border:1px solid #bbf7d0;
  color:#15803d;font-size:11.5px;font-weight:700;
  padding:6px 14px;border-radius:100px;margin-bottom:16px;
}
.exp-cta-row{
  display:flex;align-items:center;justify-content:space-between;
  background:#000032;border-radius:12px;padding:13px 16px;
  margin-bottom:12px;
}
.exp-cta-row span{font-size:13px;font-weight:700;color:#fff}
.exp-cta-row i{font-size:16px;color:rgba(255,255,255,0.7)}
.flip-hint{
  display:flex;align-items:center;justify-content:flex-end;gap:5px;
  font-size:11.5px;color:#9ca3af;font-weight:600;
  cursor:pointer;padding:2px 0;
  transition:color 0.2s;
}
.flip-hint:hover{color:#15803d}
.flip-hint-arrow{font-size:13px;color:#15803d}

/* ── BACK FACE CONTENT ─────────────── */
.back-inner{
  padding:22px 20px;
  position:relative;
  min-height:200px;
  max-height:460px;
  overflow-y:auto;
  overflow-x:hidden;
  scroll-behavior:smooth;
  /* hide native scrollbar */
  scrollbar-width:none;
  -ms-overflow-style:none;
}
.back-inner::-webkit-scrollbar{display:none}

/* custom scroll indicator */
.scroll-track{
  position:absolute;right:8px;top:16px;bottom:16px;
  width:3px;border-radius:3px;background:rgba(255,255,255,0.1);
  pointer-events:none;
}
.scroll-thumb{
  width:3px;border-radius:3px;
  background:rgba(255,255,255,0.35);
  position:absolute;top:0;left:0;right:0;
  transition:height 0.1s,top 0.1s;
  min-height:20px;
}

.back-eyebrow{
  font-size:9.5px;font-weight:700;letter-spacing:0.14em;
  text-transform:uppercase;color:#16a34a;margin-bottom:8px;
}
.back-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:28px;color:#fff;line-height:1.05;
  letter-spacing:0.02em;margin-bottom:14px;
}
.back-divider{height:1px;background:rgba(255,255,255,0.12);margin-bottom:14px}
.back-desc{font-size:13px;color:rgba(255,255,255,0.8);line-height:1.65;margin-bottom:16px}

.back-items{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.back-item{display:flex;align-items:flex-start;gap:9px}
.back-check{
  width:18px;height:18px;border-radius:50%;
  background:rgba(22,163,74,0.2);border:1.5px solid rgba(22,163,74,0.5);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;font-size:9px;color:#16a34a;
}
.back-item-text{font-size:12.5px;color:rgba(255,255,255,0.75);line-height:1.5}
.back-item-text strong{color:#fff;font-weight:700}

.back-best{
  background:rgba(21,128,61,0.2);border:1px solid rgba(22,163,74,0.35);
  border-radius:12px;padding:13px 14px;margin-bottom:14px;
}
.back-best-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#16a34a;margin-bottom:5px}
.back-best-text{font-size:12.5px;color:rgba(255,255,255,0.82);line-height:1.5}

.back-saving{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);
  color:#fff;font-size:11.5px;font-weight:700;
  padding:6px 14px;border-radius:100px;margin-bottom:16px;
}
.back-cta{
  background:linear-gradient(90deg,#15803d,#16a34a);
  border-radius:12px;padding:14px 16px;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:opacity 0.2s;
}
.back-cta:active{opacity:0.85}
.back-cta span{font-size:13.5px;font-weight:700;color:#fff}
.back-cta i{font-size:16px;color:rgba(255,255,255,0.85)}
.back-flip-back{
  display:flex;align-items:center;justify-content:center;gap:5px;
  margin-top:14px;font-size:11.5px;color:rgba(255,255,255,0.45);
  font-weight:600;cursor:pointer;transition:color 0.2s;
  padding-bottom:4px;
}
.back-flip-back:hover{color:rgba(255,255,255,0.8)}

/* ── ACTIVE CARD LIFT ──────────────── */
.c-card.active{
  transform:translateY(-6px);
  z-index:10;
}
.c-card{z-index:1}
</style>
</head>
<body>
<div class="root">

  <div class="section-head">
    <div class="s-eyebrow">Replacement Engine Options</div>
    <div class="s-title">Compare <em>Engine</em><br>Replacement Types</div>
    <p class="s-sub">Tap a card to expand full details, then flip for deeper specs and savings.</p>
  </div>

  <div class="stack-outer" id="stack"></div>

</div>

<script>
const CARDS = [
  {
    title:"Used Replacement Engines",
    fromPrice:"From £800",
    priceFull:"£800 – £2,800",type:"supply only",
    desc:"Take-out units from donor vehicles, compression-tested and mileage-verified. Most affordable route to get back on the road quickly.",
    items:[
      {l:"Condition",v:"Compression, leak-down and oil pressure checked"},
      {l:"Warranty",v:"Short warranty included — terms vary by supplier"}
    ],
    bestFor:"Budget-conscious owners and older vehicles where a full recon isn't economical.",
    saving:"Save 70–85% vs new",
    cta:"Get used engine quotes"
  },
  {
    title:"Reconditioned Engines",
    fromPrice:"From £1,200",
    priceFull:"£1,200 – £3,800",type:"supply only",
    desc:"Stripped to bare block, cleaned and rebuilt with brand-new OEM-spec gaskets, seals, bearings and timing components. Most popular UK choice.",
    items:[
      {l:"What's replaced",v:"All gaskets, seals, bearings, timing components"},
      {l:"What's retained",v:"Original block and major castings — inspected and approved"},
      {l:"Warranty",v:"12–24 months unlimited mileage"}
    ],
    bestFor:"Owners who want factory-level reliability without the factory price tag.",
    saving:"Save 50–65% vs dealer new",
    cta:"Compare reconditioned prices"
  },
  {
    title:"Rebuilt Engines",
    fromPrice:"From £2,500",
    priceFull:"£2,500 – £5,500",type:"supply only",
    desc:"Fully disassembled — every wearing surface inspected, machined or replaced and bench-tested before dispatch. For catastrophic failures.",
    items:[
      {l:"Process",v:"Every surface machined to tolerance, bench pressure-tested"},
      {l:"Best for",v:"Seized engines, snapped timing chains, spun bearings"},
      {l:"Warranty",v:"Minimum 12–24 months on all rebuilt units"}
    ],
    bestFor:"Vehicles with severe engine damage where reconditioning alone won't suffice.",
    saving:"Save 40–55% vs dealer new",
    cta:"Get rebuilt engine quotes"
  },
  {
    title:"Remanufactured Engines",
    fromPrice:"From £3,000",
    priceFull:"£3,000 – £6,500",type:"supply only",
    desc:"Every surface machined to OEM tolerances, every component replaced — the closest available to a factory-new engine with full build documentation.",
    items:[
      {l:"Standard",v:"Full OEM tolerances — every component replaced"},
      {l:"Documentation",v:"Complete build docs supplied with the engine"},
      {l:"Warranty",v:"Up to 36 months available"}
    ],
    bestFor:"Performance models, high-mileage vehicles, or where longevity is non-negotiable.",
    saving:"Save 50–65% vs OEM new",
    cta:"Compare remanufactured prices"
  },
  {
    title:"Refurbished Engines",
    fromPrice:"From £900",
    priceFull:"£900 – £2,400",type:"supply only",
    desc:"Cleaned and bench-tested on core checks — compression, leak-down and oil pressure — without a full strip-down. Faster than full recon.",
    items:[
      {l:"Tests passed",v:"Compression, leak-down and oil pressure verified"},
      {l:"vs reconditioned",v:"20–35% more affordable, faster dispatch"}
    ],
    bestFor:"Older or lower-value vehicles where a full recon isn't economical.",
    saving:"Save 20–35% vs reconditioned",
    cta:"View refurbished options"
  },
  {
    title:"Engine Supply & Fit",
    fromPrice:"Fitting from £500",
    priceFull:"£500 – £1,500",type:"added to engine cost",
    desc:"Engine delivered and fitted by a vetted UK specialist — includes removal, all fluids and a separate workmanship warranty.",
    items:[
      {l:"Turnaround",v:"3–5 working days from order confirmation"},
      {l:"Includes",v:"Removal, fit, all fluids, workmanship warranty"},
      {l:"vs dealer labour",v:"30–45% cheaper — typical saving"}
    ],
    bestFor:"Anyone who wants a complete solution — engine and fitting arranged in one place.",
    saving:"No hidden costs — quoted up front",
    cta:"Find supply & fit deals"
  }
];

let activeIdx = -1;  // which card is front/active
let flippedIdx = -1; // which card is on back face

function buildStack(){
  const stack = document.getElementById('stack');
  stack.innerHTML = '';

  CARDS.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'c-card';
    card.dataset.i = i;
    card.style.position = 'relative';

    // check icon (simple SVG to avoid icon font dependency issues)
    const checkSVG = `<svg width="9" height="9" viewBox="0 0 9 9" fill="none"><polyline points="1.5,4.5 3.5,6.8 7.5,2" stroke="#15803d" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const checkSVGwhite = `<svg width="9" height="9" viewBox="0 0 9 9" fill="none"><polyline points="1.5,4.5 3.5,6.8 7.5,2" stroke="#16a34a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const arrowSVG = `<svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M3 7.5h9M8 3.5l4 4-4 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const trendSVG = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="1,9 4.5,5 7,7.5 12,3" stroke="#15803d" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9,3 12,3 12,6" stroke="#15803d" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const trendSVGwhite = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><polyline points="1,9 4.5,5 7,7.5 12,3" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9,3 12,3 12,6" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const rotateSVG = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M11.5 6.5A5 5 0 0 1 2 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M1.5 6.5A5 5 0 0 1 11 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="10,2.5 11,5 8.5,5.8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    card.innerHTML = `
      <div class="flip-inner" id="fi-${i}">

        <!-- FRONT FACE -->
        <div class="face face-front" id="ff-${i}">
          <div class="peek-bar" data-action="activate" data-idx="${i}">
            <div class="peek-left">
              <div class="peek-num">0${i+1} of ${CARDS.length}</div>
              <div class="peek-title">${c.title}</div>
            </div>
            <div class="peek-price">${c.fromPrice}</div>
            <div class="peek-icon" aria-hidden="true">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <line x1="6.5" y1="1" x2="6.5" y2="12" stroke="#15803d" stroke-width="1.8" stroke-linecap="round"/>
                <line x1="1" y1="6.5" x2="12" y2="6.5" stroke="#15803d" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
            </div>
          </div>
          <div class="card-expand" id="ce-${i}">
            <div class="expand-inner" id="ei-${i}">
              <div class="exp-price-row">
                <div class="exp-price-badge">${trendSVG} ${c.priceFull}</div>
                <div class="exp-type">${c.type}</div>
              </div>
              <div class="exp-divider"></div>
              <div class="exp-desc">${c.desc}</div>
              <div class="exp-items">${c.items.map(it=>`
                <div class="exp-item">
                  <div class="exp-check">${checkSVG}</div>
                  <div class="exp-item-text"><strong>${it.l}:</strong> ${it.v}</div>
                </div>`).join('')}</div>
              <div class="exp-saving">${trendSVG} ${c.saving}</div>
              <div class="exp-cta-row" role="button">
                <span>${c.cta}</span>
                ${arrowSVG}
              </div>
              <div class="flip-hint" data-action="flip" data-idx="${i}">
                Tap to see full details ${rotateSVG}
                <span class="flip-hint-arrow"></span>
              </div>
            </div>
          </div>
        </div>

        <!-- BACK FACE -->
        <div class="face face-back" id="fb-${i}">
          <div class="back-inner" id="bi-${i}">
            <div class="back-eyebrow">Full Details — ${c.title}</div>
            <div class="back-title">${c.title}</div>
            <div class="back-divider"></div>
            <div class="back-desc">${c.desc}</div>
            <div class="back-items">${c.items.map(it=>`
              <div class="back-item">
                <div class="back-check">${checkSVGwhite}</div>
                <div class="back-item-text"><strong>${it.l}:</strong> ${it.v}</div>
              </div>`).join('')}</div>
            <div class="back-best">
              <div class="back-best-label">Best For</div>
              <div class="back-best-text">${c.bestFor}</div>
            </div>
            <div class="back-saving">${trendSVGwhite} ${c.saving}</div>
            <div class="back-cta" role="button">
              <span>${c.cta}</span>
              ${arrowSVG.replace('currentColor','#fff')}
            </div>
            <div class="back-flip-back" data-action="unflip" data-idx="${i}">
              ${rotateSVG.replace('currentColor','rgba(255,255,255,0.45)')} Back to overview
            </div>
          </div>
          <div class="scroll-track"><div class="scroll-thumb" id="st-${i}"></div></div>
        </div>

      </div>`;

    stack.appendChild(card);
  });

  attachEvents();
}

function attachEvents(){
  // Activate (expand front)
  document.querySelectorAll('[data-action="activate"]').forEach(el => {
    el.addEventListener('click', e => {
      const i = parseInt(el.dataset.idx);
      activateCard(i);
    });
  });
  // Flip to back
  document.querySelectorAll('[data-action="flip"]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const i = parseInt(el.dataset.idx);
      flipCard(i);
    });
  });
  // Unflip to front
  document.querySelectorAll('[data-action="unflip"]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const i = parseInt(el.dataset.idx);
      unflipCard(i);
    });
  });
  // Scroll indicator
  document.querySelectorAll('.back-inner').forEach((el, i) => {
    el.addEventListener('scroll', () => updateScrollThumb(i));
    // init after paint
    setTimeout(() => updateScrollThumb(i), 100);
  });
}

function activateCard(i){
  const cards = document.querySelectorAll('.c-card');

  if(activeIdx === i){
    // deactivate
    setActive(-1);
    return;
  }
  // If another card was flipped, unflip it silently
  if(flippedIdx !== -1 && flippedIdx !== i){
    const fi = document.getElementById('fi-'+flippedIdx);
    if(fi) fi.style.transform = '';
    document.querySelectorAll('.c-card')[flippedIdx].classList.remove('flipped');
    flippedIdx = -1;
  }
  // If tapping a non-active card while another is flipped, unflip first
  if(flippedIdx === i){
    unflipCard(i);
    return;
  }
  setActive(i);
}

function setActive(i){
  activeIdx = i;
  const cardEls = document.querySelectorAll('.c-card');
  cardEls.forEach((card, idx) => {
    if(idx === i){
      card.classList.add('active');
      // measure and set expand height
      const ei = document.getElementById('ei-'+idx);
      const ce = document.getElementById('ce-'+idx);
      if(ei && ce){
        const h = ei.scrollHeight;
        ce.style.height = h + 'px';
      }
    } else {
      card.classList.remove('active');
      card.classList.remove('flipped');
      const ce = document.getElementById('ce-'+idx);
      if(ce) ce.style.height = '0px';
    }
  });
}

function flipCard(i){
  if(activeIdx !== i) return;
  flippedIdx = i;
  document.querySelectorAll('.c-card')[i].classList.add('flipped');
  setTimeout(() => {
    // set back face height to match front expanded height
    const fb = document.getElementById('fb-'+i);
    const bi = document.getElementById('bi-'+i);
    if(fb && bi){
      const frontH = document.getElementById('ff-'+i).scrollHeight;
      const backH = bi.scrollHeight + 44; // padding
      fb.style.minHeight = Math.max(frontH, Math.min(backH, 460)) + 'px';
    }
    updateScrollThumb(i);
  }, 100);
}

function unflipCard(i){
  flippedIdx = -1;
  document.querySelectorAll('.c-card')[i].classList.remove('flipped');
}

function updateScrollThumb(i){
  const bi = document.getElementById('bi-'+i);
  const st = document.getElementById('st-'+i);
  if(!bi || !st) return;
  const ratio = bi.scrollTop / Math.max(1, bi.scrollHeight - bi.clientHeight);
  const trackH = bi.clientHeight - 32;
  const thumbH = Math.max(20, (bi.clientHeight / bi.scrollHeight) * trackH);
  const thumbTop = ratio * (trackH - thumbH);
  st.style.height = thumbH + 'px';
  st.style.top = (16 + thumbTop) + 'px';
}

buildStack();
</script>
